# CodeRabbit — Configuration Timeo
# Docs: https://docs.coderabbit.ai/configuration-guide

# Reviews automatiques sur chaque PR
reviews:
  # Auto-review à l'ouverture de la PR
  auto_review:
    enabled: true
    drafts: false
  # Path-specific instructions
  path_instructions:
    - path: "server/src/routes/**"
      instructions: |
        - Valider avec Zod sur chaque endpoint
        - Handler = orchestration seulement (valider → logique → répondre)
        - Soft delete : filtrer isNull(deletedAt)
        - Format d'erreur canonique obligatoire
    - path: "server/src/db/schema/**"
      instructions: |
        - Colonnes en anglais (status, priority, startTime, etc.)
        - FK avec arrow functions: () => table.column
        - Ne pas modifier better-auth.ts
    - path: "client/src/components/**"
      instructions: |
        - Composant = fonction, pas de classes
        - Pas de React.FC<Props>
        - Pas de useMemo/useCallback par défaut
        - Props typées, jamais any
    - path: "shared/src/schemas/**"
      instructions: |
        - Zod = source unique de vérité
        - Type inféré: z.infer<typeof schema>
        - Pas de types manuels dupliquant Zod

# Chat avec le bot
chat:
  auto_reply: true

# Langue des reviews
language: fr

# Tone
tone_instructions: |
  Pédagogique et bienveillant (junior solo). Vérifie : pas de any, console.log, TODO, fichier >250 lignes, fonction >30 lignes, classe/interface. Early return, named exports, erreurs format canonique, colonnes anglais, UI français, Zod.
